name: Build & Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      commit:
        description: The specific commit SHA or branch name to build from (e.g., main or a feature branch)
        required: true
        default: main
      tag:
        description: The version tag for the Docker image (e.g., 1.0.0) ⚠️ Without v prefix ⚠️
        required: true
      latest:
        description: Choose "yes" to also tag the image as "latest" in Docker Hub
        required: true
        type: choice
        options:
          - "no"
          - "yes"

jobs:
  build-and-push-images:
    strategy:
      matrix:
        vars:
          [
            { os: ubuntu-24.04, platform: amd64 },
            { os: ubuntu-24.04-arm, platform: arm64 },
          ]

    name: Build and push images
    runs-on: ${{ matrix.vars.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build the Docker image
        run: >
          docker build
          --tag snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-${{ matrix.vars.platform }}
          --build-arg TARGETPLATFORM=linux/${{ matrix.vars.platform }}
          --file docker/Dockerfile .

      - name: Push the Docker image
        run: docker push snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-${{ matrix.vars.platform }}

  merge-and-push-manifest:
    name: Merge manifest
    needs: build-and-push-images
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Merge and push manifest
        run: |
          docker manifest create snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }} \
          snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-amd64 \
          snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-arm64

          docker manifest push snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}

          if [ "${{ github.event.inputs.latest }}" == "yes" ]; then
            docker manifest create snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:latest \
            snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-amd64 \
            snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:${{ github.event.inputs.tag }}-arm64

            docker manifest push snapshot-repo.brusnika.tech/brusnika/pgbackweb-backend:latest
          fi
